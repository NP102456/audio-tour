<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ปางช้างเผือกเชียงคาน</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI", Arial;
color:white;

background-image:url("p4.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* overlay */

.overlay{
background:rgba(0,0,0,0.55);
min-height:100vh;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

padding:40px 20px;

position:relative;
}

/* ปุ่มกลับ */

.back{
position:absolute;
top:20px;
left:20px;

padding:10px 18px;

border-radius:30px;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(8px);

color:white;
text-decoration:none;

font-size:14px;

transition:0.3s;

box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.back:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.05);
}

/* title */

h1{
text-align:center;
font-size:34px;
margin-bottom:20px;
text-shadow:0 3px 10px rgba(0,0,0,0.6);
}

/* description */

.text{
max-width:650px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(8px);

padding:25px;

border-radius:15px;

font-size:17px;
line-height:1.7;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* buttons */

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:35px;
}

/* listen button */

.listen{
background:linear-gradient(45deg,#ff9800,#ffb74d);
color:white;
font-size:18px;
padding:16px 32px;
border:none;
border-radius:40px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.listen:hover{
transform:scale(1.08);
}

/* navigation */

.nav{
display:flex;
justify-content:space-between;
width:320px;
}

/* prev */

.prev{
background:rgba(255,255,255,0.15);
color:white;

border:none;

padding:14px 24px;

border-radius:30px;

font-size:16px;

cursor:pointer;

backdrop-filter:blur(6px);

box-shadow:0 5px 15px rgba(0,0,0,0.3);

transition:0.3s;
}

.prev:hover{
background:rgba(255,255,255,0.3);
transform:translateY(-3px);
}

/* finish */

.finish{
background:linear-gradient(45deg,#4caf50,#66bb6a);

color:white;

border:none;

padding:14px 24px;

border-radius:30px;

font-size:16px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.3);

transition:0.3s;
}

.finish:hover{
transform:translateY(-3px);
}

/* mobile */

@media(max-width:600px){

h1{
font-size:26px;
}

.text{
font-size:15px;
padding:18px;
}

.nav{
width:260px;
}

}

</style>

</head>

<body>

<div class="overlay">

<a class="back" href="tour.html">⬅ กลับ</a>

<h1>ปางช้างเผือกเชียงคาน</h1>

<div class="text">

ปางช้างเผือกเชียงคาน เป็นสถานที่ท่องเที่ยวเชิงอนุรักษ์
ที่เปิดโอกาสให้นักท่องเที่ยวได้เรียนรู้วิถีชีวิตของช้าง
รวมถึงการดูแลและอยู่ร่วมกับช้างอย่างใกล้ชิด
เป็นประสบการณ์ที่ช่วยสร้างความเข้าใจและการอนุรักษ์สัตว์ป่า

</div>

<div class="buttons">

<button class="listen" onclick="playAudio()">
🎧 ฟังคำบรรยาย
</button>

<div class="nav">

<button class="prev" onclick="prev()">⬅ ก่อนหน้า</button>

<button class="finish" onclick="finish()">🏠 เลือกสถานที่</button>

</div>

</div>

<audio id="voice" src="place4-th.mp3"></audio>

</div>

<script>

function playAudio(){
document.getElementById("voice").play()
}

function prev(){
window.location.href="place3.html"
}

function finish(){
window.location.href="tour.html"
}

</script>

</body>
</html>
