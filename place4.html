
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>วัดจอมมณี</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

background:black;

font-family:"Segoe UI", Arial;

display:flex;
justify-content:center;

}

/* mobile frame */

.overlay{

width:100%;
max-width:420px;

min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("p4.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

padding:30px 20px;

position:relative;

color:white;

display:flex;
flex-direction:column;
align-items:center;

}

/* language */

.lang-box{

position:absolute;
top:15px;
right:15px;

}

.lang-box select{

padding:6px 10px;
border-radius:10px;
border:none;

}

/* back */

.back{

position:absolute;
top:15px;
left:15px;

background:rgba(255,255,255,0.2);

padding:8px 12px;

border-radius:10px;

color:white;
text-decoration:none;

}

/* title */

h1{

margin-top:70px;

font-size:26px;

text-align:center;

}

/* description */

.desc{

margin-top:20px;

background:rgba(255,255,255,0.15);

padding:18px;

border-radius:15px;

font-size:15px;

text-align:center;

line-height:1.6;

}

/* listen */

.listen{

margin-top:35px;

background:linear-gradient(45deg,#ff9800,#ffb74d);

color:white;

font-size:16px;

padding:14px 28px;

border:none;

border-radius:30px;

cursor:pointer;

}

/* nav */

.nav{

margin-top:25px;

display:flex;
gap:20px;

}

.prev{

background:rgba(255,255,255,0.25);

border:none;

padding:12px 20px;

border-radius:25px;

color:white;

cursor:pointer;

}

.next{

background:linear-gradient(45deg,#00bcd4,#26c6da);

border:none;

padding:12px 20px;

border-radius:25px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="overlay">

<div class="lang-box">
<select onchange="setLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇬🇧 English</option>
</select>
</div>

<a class="back" id="backBtn" href="tour.html">⬅ กลับ</a>

<h1 id="title">วัดจอมมณี</h1>

<div class="desc" id="desc">

วัดจอมมณีเป็นวัดเก่าแก่ที่มีความสำคัญต่อชุมชน
ตั้งอยู่ในพื้นที่อำเภอเชียงคาน จังหวัดเลย

ภายในวัดมีสถาปัตยกรรมที่สวยงาม
และเป็นสถานที่ที่ชาวบ้านใช้ประกอบพิธีกรรมทางศาสนา

นักท่องเที่ยวสามารถเข้ามาสักการะพระพุทธรูป
ชมบรรยากาศที่เงียบสงบ
และเรียนรู้วัฒนธรรมท้องถิ่นของชุมชนได้ที่นี่

</div>

<button class="listen" id="listenBtn" onclick="playAudio()">
🎧 ฟังคำบรรยาย
</button>

<div class="nav">

<button class="prev" id="prevBtn" onclick="prev()">⬅ ก่อนหน้า</button>

<button class="next" id="nextBtn" onclick="next()">➡ ถัดไป</button>

</div>

<audio id="voice"></audio>

</div>

<script>

function setLang(lang){
localStorage.setItem("lang",lang)
changeLang(lang)
}

function changeLang(lang){

let voice=document.getElementById("voice")

/* ให้ dropdown เปลี่ยนตามภาษาที่บันทึก */
document.querySelector("select").value = lang

if(lang==="en"){

document.getElementById("title").innerText="Wat Chom Manee"

document.getElementById("desc").innerText =
"Wat Chom Manee serves as the spiritual heart of the Ban Tha Dee Mee community. This historic temple was established around 1911 by a wandering monk from Northern Laos named 'Ajna Chapol.'The temple’s most revered treasures are Phra Siang and Phra Yaem, sacred Buddha images with deep historical roots dating back to the ancient city of Muang Pak Hueang. Additionally, the Phra Siang Hall houses a rare collection of hand-carved wooden Buddha statues from the 25th Buddhist century. These artifacts are masterpieces of local craftsmanship, reflecting the profound faith and artistic heritage of the Ban Tha Dee Mee ancestors, and remain an invaluable cultural legacy for future generations to study and revere."
document.getElementById("listenBtn").innerText="🎧 Listen"
document.getElementById("prevBtn").innerText="⬅ Previous"
document.getElementById("nextBtn").innerText="➡ Next"
document.getElementById("backBtn").innerText="⬅ Back"

voice.src="PE4.mp3"

}
else{

document.getElementById("title").innerText="วัดจอมมณี"

document.getElementById("desc").innerText =
"วัดจอมมณี คือศูนย์รวมจิตใจและศาสนสถานสำคัญของชุมชนบ้านท่าดีหมี มีประวัติยาวนานมาตั้งแต่ปี พ.ศ. 2454 โดยมีจุดเริ่มต้นจาก 'อาชญาชาพล' พระธุดงค์จากทางตอนเหนือของ สปป.ลาว เป็นผู้สร้างขึ้นสิ่งที่ถือเป็นหัวใจสำคัญของวัดแห่งนี้คือ พระเสี่ยง และ พระแย้ม พระพุทธรูปศักดิ์สิทธิ์คู่บ้านคู่เมืองที่มีประวัติสืบทอดมาจากชุมชนโบราณเมืองปากเหือง นอกจากนี้ ภายในหอพระเสี่ยงยังเป็นที่ประดิษฐาน พระพุทธรูปไม้แกะสลัก ฝีมือช่างพื้นบ้านสมัยพุทธศตวรรษที่ 25 อีกหลายองค์ ซึ่งเป็นมรดกทางศิลปกรรมอันล้ำค่าที่สะท้อนถึงศรัทธาและภูมิปัญญาของชาวบ้านท่าดีหมีในอดีตที่ควรค่าแก่การอนุรักษ์ไว้ให้คนรุ่นหลังได้ศึกษาครับ"

document.getElementById("listenBtn").innerText="🎧 ฟังคำบรรยาย"
document.getElementById("prevBtn").innerText="⬅ ก่อนหน้า"
document.getElementById("nextBtn").innerText="➡ ถัดไป"
document.getElementById("backBtn").innerText="⬅ กลับ"

voice.src="PT4.mp3"

}

}

/* เล่นเสียง */

function playAudio(){

let voice=document.getElementById("voice")
voice.currentTime = 0
voice.play()

}

/* navigation */

function prev(){
window.location.href="place3.html"
}

function next(){
window.location.href="place5.html"
}

/* โหลดภาษา */

window.onload=function(){

let lang = localStorage.getItem("lang") || "th"
changeLang(lang)

}

</script>

</body>
</html>
