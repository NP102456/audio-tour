
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>Tour Guide</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:"Segoe UI", Arial, sans-serif;
color:white;
text-align:center;

height:100vh;

background:black;

display:flex;
justify-content:center;
align-items:center;

}

/* กรอบมือถือ */

.overlay{

width:100%;
max-width:420px;
height:100vh;

/* รูปพื้นหลังอยู่เฉพาะในกรอบมือถือ */

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("index.png");

background-size:100% 100%;
background-position:center;
background-repeat:no-repeat;

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:30px 20px;

position:relative;

}

/* language */

.lang-box{

position:absolute;
top:15px;
right:15px;

}

.lang-box select{

padding:6px 10px;
border-radius:10px;
border:none;
font-size:14px;

}

/* title */

h1{

font-size:34px;
margin-top:50px;

text-shadow:0 4px 10px rgba(0,0,0,0.6);

}

/* middle */

.middle{

flex:1;

display:flex;
align-items:center;
justify-content:center;

}

/* PLAY BUTTON */

.play-btn{

width:120px;
height:120px;

border-radius:50%;

font-size:50px;

background:linear-gradient(45deg,#ff9800,#ff5722);

display:flex;
align-items:center;
justify-content:center;

border:none;
color:white;

cursor:pointer;

box-shadow:0 10px 30px rgba(0,0,0,0.5);

transition:0.25s;

}

.play-btn:hover{
transform:scale(1.08);
}

.play-btn:active{
transform:scale(0.9);
}

/* NEXT BUTTON */

.next-btn{

width:80px;
height:80px;

border-radius:50%;

font-size:34px;

background:linear-gradient(45deg,#2196F3,#1565C0);

display:flex;
align-items:center;
justify-content:center;

border:none;

color:white;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,0.5);

margin-bottom:10px;

transition:0.25s;

}

.next-btn:hover{
transform:scale(1.08);
}

.next-btn:active{
transform:scale(0.9);
}

/* mobile */

@media(max-width:380px){

h1{
font-size:28px;
}

.play-btn{
width:100px;
height:100px;
font-size:40px;
}

.next-btn{
width:70px;
height:70px;
font-size:28px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="lang-box">

<select onchange="setLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇬🇧 English</option>
</select>

</div>

<h1 id="title">ท่าดีหมีวิถีใหม่</h1>

<div class="middle">

<button class="play-btn" onclick="playAudio()" id="listenBtn">
🎧
</button>

</div>

<button class="next-btn" onclick="nextPage()" id="nextBtn">
⏭
</button>

</div>

<audio id="voice"></audio>

<script src="script.js"></script>

</body>
</html>
