<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tour Guide</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background-image:url("12.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

.lang-box{
position:absolute;
top:20px;
right:20px;
}

.lang-box select{
padding:8px;
border-radius:8px;
border:none;
}

.overlay{
background:rgba(0,0,0,0.5);
height:100vh;

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:40px 20px;
}

h1{
margin-top:20px;
font-size:60px;
}

.middle{
margin-top:auto;
margin-bottom:auto;
}

/* PLAY BUTTON */

.play-btn{

width:110px;
height:110px;

border-radius:50%;

font-size:48px;

background:linear-gradient(45deg,#ff9800,#ff5722);

display:flex;
align-items:center;
justify-content:center;

border:none;

color:white;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

transition:0.3s;

}

.play-btn:hover{
transform:scale(1.1);
}

.play-btn:active{
transform:scale(0.9);
}

/* NEXT BUTTON */

.next-btn{

width:90px;
height:90px;

border-radius:50%;

font-size:38px;

background:linear-gradient(45deg,#2196F3,#1565C0);

display:flex;
align-items:center;
justify-content:center;

border:none;

color:white;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

transition:0.3s;

margin-bottom:20px;

}

.next-btn:hover{
transform:scale(1.1);
}

.next-btn:active{
transform:scale(0.9);
}

</style>

</head>

<body>

<div class="lang-box">

<select onchange="setLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇬🇧 English</option>
</select>

</div>

<div class="overlay">

<h1 id="title">ท่าดีหมีวิถีใหม่</h1>

<div class="middle">

<button class="play-btn" onclick="playAudio()" id="listenBtn">
▶
</button>

</div>

<button class="next-btn" onclick="nextPage()" id="nextBtn">
⏭
</button>

</div>

<audio id="voice"></audio>

<script src="script.js"></script>

</body>
</html>
