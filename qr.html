<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audio Tour QR</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f2f2;
font-family:Arial, sans-serif;
}

.container{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.link{
margin-bottom:20px;
font-size:16px;
word-break:break-all;
}

#qrcode{
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div class="container">

<div class="link">
https://np102456.github.io/audio-tour/
</div>

<div id="qrcode"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

new QRCode(document.getElementById("qrcode"), {
text: "https://np102456.github.io/audio-tour/",
width: 220,
height: 220
});

</script>

</body>
</html>
