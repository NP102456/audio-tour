<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สกายวอร์คพระใหญ่ภูคกงิ้ว</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:"Segoe UI", Arial;
color:white;

background-image:url("sky.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

/* overlay */

.overlay{

background:rgba(0,0,0,0.55);

min-height:100vh;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

padding:40px 20px;

position:relative;

}

/* ปุ่มกลับ */

.back{

position:absolute;
top:20px;
left:20px;

padding:10px 18px;

border-radius:30px;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(8px);

color:white;
text-decoration:none;

font-size:14px;

transition:0.3s;

box-shadow:0 5px 15px rgba(0,0,0,0.3);

}

.back:hover{

background:rgba(255,255,255,0.35);

transform:scale(1.05);

}

/* title */

h1{

text-align:center;

font-size:34px;

margin-bottom:20px;

text-shadow:0 3px 10px rgba(0,0,0,0.6);

}

/* text box */

.text{

max-width:650px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(8px);

padding:25px;

border-radius:15px;

font-size:17px;

line-height:1.7;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

}

/* buttons */

.buttons{

display:flex;
flex-direction:column;

align-items:center;

gap:18px;

margin-top:35px;

}

/* button style */

button{

padding:14px 26px;

border:none;

border-radius:30px;

font-size:16px;

cursor:pointer;

transition:0.25s;

}

/* listen */

.listen{

background:linear-gradient(45deg,#ff9800,#ffb74d);

color:white;

box-shadow:0 6px 18px rgba(0,0,0,0.4);

}

.listen:hover{

transform:scale(1.08);

}

/* next */

.next{

background:linear-gradient(45deg,#00bcd4,#26c6da);

color:white;

box-shadow:0 6px 18px rgba(0,0,0,0.4);

}

.next:hover{

transform:translateY(-3px);

}

/* mobile */

@media(max-width:600px){

h1{
font-size:26px;
}

.text{
font-size:15px;
padding:18px;
}

}

</style>

</head>

<body>

<div class="overlay">

<a class="back" href="tour.html">⬅ กลับ</a>

<h1>สกายวอร์คพระใหญ่ภูคกงิ้ว</h1>

<div class="text">

สกายวอร์คเชียงคาน เป็นจุดชมวิวแม่น้ำโขงที่สวยงาม  
ตั้งอยู่บนภูคกงิ้ว นักท่องเที่ยวสามารถเดินชมวิวผ่านพื้นกระจกใส  
มองเห็นแม่น้ำโขงและภูเขาฝั่งลาวได้อย่างชัดเจน

</div>

<div class="buttons">

<button class="listen" onclick="playAudio()">
🎧 ฟังคำบรรยาย
</button>

<button class="next" onclick="next()">
➡ สถานที่ถัดไป
</button>

</div>

<audio id="voice" src="place1-th.mp3"></audio>

</div>

<script>

function playAudio(){
document.getElementById("voice").play()
}

function next(){
window.location.href="place2.html"
}

</script>

</body>
</html>
