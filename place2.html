
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>แม่น้ำเหือง</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

background:black;

font-family:"Segoe UI", Arial;

display:flex;
justify-content:center;

}

/* mobile frame */

.overlay{

width:100%;
max-width:420px;

min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("p2.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

padding:30px 20px;

position:relative;

color:white;

display:flex;
flex-direction:column;
align-items:center;

}

/* language */

.lang-box{

position:absolute;
top:15px;
right:15px;

}

.lang-box select{

padding:6px 10px;
border-radius:10px;
border:none;

}

/* back */

.back{

position:absolute;
top:15px;
left:15px;

background:rgba(255,255,255,0.2);

padding:8px 12px;

border-radius:10px;

color:white;
text-decoration:none;

}

/* title */

h1{

margin-top:70px;

font-size:28px;

text-align:center;

}

/* description */

.desc{

margin-top:20px;

background:rgba(255,255,255,0.15);

padding:18px;

border-radius:15px;

font-size:15px;

text-align:center;

line-height:1.6;

}

/* listen button */

.listen{

margin-top:35px;

background:linear-gradient(45deg,#ff9800,#ffb74d);

color:white;

font-size:16px;

padding:14px 28px;

border:none;

border-radius:30px;

cursor:pointer;

}

/* navigation */

.nav{

margin-top:25px;

display:flex;
gap:20px;

}

.prev{

background:rgba(255,255,255,0.25);

border:none;

padding:12px 20px;

border-radius:25px;

color:white;

cursor:pointer;

}

.next{

background:linear-gradient(45deg,#00bcd4,#26c6da);

border:none;

padding:12px 20px;

border-radius:25px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="overlay">

<div class="lang-box">
<select onchange="setLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇬🇧 English</option>
</select>
</div>

<a class="back" id="backBtn" href="tour.html">⬅ กลับ</a>

<h1 id="title">แม่น้ำเหือง</h1>

<div class="desc" id="desc">

แม่น้ำเหืองเป็นแม่น้ำสำคัญที่ไหลผ่านจังหวัดเลย และเป็นส่วนหนึ่งของเส้นแบ่งเขตแดนระหว่างประเทศไทยกับประเทศลาว ก่อนจะไหลมาบรรจบกับแม่น้ำโขงที่อำเภอเชียงคาน

</div>

<button class="listen" id="listenBtn" onclick="playAudio()">
🎧 ฟังคำบรรยาย
</button>

<div class="nav">

<button class="prev" id="prevBtn" onclick="prev()">⬅ ก่อนหน้า</button>

<button class="next" id="nextBtn" onclick="next()">➡ ถัดไป</button>

</div>

<audio id="voice"></audio>

</div>

<script>

function setLang(lang){

localStorage.setItem("lang",lang)
changeLang(lang)

}

function changeLang(lang){

let voice=document.getElementById("voice")

document.querySelector("select").value=lang

if(lang==="en"){

document.getElementById("title").innerText="Hueang River"

document.getElementById("desc").innerText=
"The Hueang River is a vital waterway flowing through Loei Province, serving as a natural border between Thailand and Laos before converging with the Mekong River in Chiang Khan District.The mouth of the Hueang River is a major tourist highlight, famous for the 'Two-Colored River' phenomenon where the clear waters of the Hueang meet the silty Mekong. This area also showcases the deep-rooted riverside lifestyle, from local fishing and agriculture to its historical role as a primary transportation route. The river remains essential to the natural ecosystem, the economy, and the cultural heritage of the communities along its banks."

document.getElementById("listenBtn").innerText="🎧 Listen"
document.getElementById("prevBtn").innerText="⬅ Previous"
document.getElementById("nextBtn").innerText="➡ Next"
document.getElementById("backBtn").innerText="⬅ Back"

voice.src="PE2.mp3"

}

else{

document.getElementById("title").innerText="แม่น้ำเหือง"

document.getElementById("desc").innerText=
"แม่น้ำเหือง เป็นแม่น้ำสำคัญที่ไหลผ่านจังหวัดเลย และเป็นส่วนหนึ่งของเส้นแบ่งเขตแดนระหว่างประเทศไทยกับประเทศลาว ก่อนจะไหลมาบรรจบกับแม่น้ำโขงที่อำเภอเชียงคานบริเวณปากแม่น้ำเหืองถือเป็นจุดท่องเที่ยวสำคัญ เพราะสามารถมองเห็น แม่น้ำสองสี จากการที่น้ำเหืองไหลมารวมกับน้ำโขง นอกจากนี้ยังเป็นพื้นที่ที่มีวิถีชีวิตของชุมชนผูกพันกับแม่น้ำ เช่น การประมง การเกษตร และการคมนาคมในอดีตแม่น้ำเหืองจึงมีความสำคัญทั้งด้าน ธรรมชาติ เศรษฐกิจ และวัฒนธรรมของชุมชนริมแม่น้ำ ในจังหวัดเลยและพื้นที่ใกล้เคียง"

document.getElementById("listenBtn").innerText="🎧 ฟังคำบรรยาย"
document.getElementById("prevBtn").innerText="⬅ ก่อนหน้า"
document.getElementById("nextBtn").innerText="➡ ถัดไป"
document.getElementById("backBtn").innerText="⬅ กลับ"

voice.src="PT2.mp3"

}

}

function playAudio(){

let voice=document.getElementById("voice")

voice.currentTime=0
voice.play()

}

function prev(){

window.location.href="place1.html"

}

function next(){

window.location.href="place3.html"

}

window.onload=function(){

let lang=localStorage.getItem("lang") || "th"
changeLang(lang)

}

</script>

</body>
</html>
