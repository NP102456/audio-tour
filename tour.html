
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tour Locations</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:"Segoe UI", Arial, sans-serif;
color:white;

height:100vh;

background:black;

display:flex;
justify-content:center;

}

/* กรอบมือถือ */

.overlay{

width:100%;
max-width:420px;

min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("tour.png");

background-size:100% 100%;
background-position:center;
background-repeat:no-repeat;

padding:30px 20px;

position:relative;

}

/* language */

.lang-box{

position:absolute;
top:15px;
right:15px;

}

.lang-box select{

padding:6px 10px;
border-radius:10px;
border:none;
font-size:14px;

}

/* ปุ่มกลับ */

.back{

position:absolute;

top:20px;
left:20px;

padding:8px 14px;

border-radius:12px;

background:rgba(255,255,255,0.2);

text-decoration:none;

color:white;

font-size:14px;

}

/* title */

h1{

text-align:center;

margin-top:50px;
margin-bottom:25px;

font-size:28px;

}

/* grid */

.grid{

display:grid;

grid-template-columns:1fr;

gap:16px;

}

/* card */

.card{

background:rgba(255,255,255,0.15);

padding:18px;

border-radius:16px;

text-decoration:none;

color:white;

font-size:17px;

box-shadow:0 8px 20px rgba(0,0,0,0.35);

display:block;

transition:0.2s;

}

.card:hover{

transform:scale(1.02);

}

.card:active{

transform:scale(0.97);

}

.number{

font-size:20px;
font-weight:bold;

margin-bottom:6px;

}

</style>

</head>

<body>

<div class="overlay">

<div class="lang-box">
<select onchange="setLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇬🇧 English</option>
</select>
</div>

<a class="back" href="index.html">
⬅ 
</a>

<h1 id="title">เลือกสถานที่ท่องเที่ยว</h1>

<div class="grid">

<a class="card" href="place1.html">
<div class="number">1️⃣</div>
<span id="p1">จุดแลนด์มาร์คสกายวอล์ค</span>
</a>

<a class="card" href="place2.html">
<div class="number">2️⃣</div>
<span id="p2">แม่น้ำเหือง</span>
</a>

<a class="card" href="place3.html">
<div class="number">3️⃣</div>
<span id="p3">พระพุทธนวมินทรมงคลลีลาทวินคราภิรักษ์</span>
</a>

<a class="card" href="place4.html">
<div class="number">4️⃣</div>
<span id="p4">วัดจอมมณี</span>
</a>

<a class="card" href="place5.html">
<div class="number">5️⃣</div>
<span id="p5">ผลิตภัณฑ์ชุมชนบ้านท่าดีหมี</span>
</a>

<a class="card" href="place6.html">
<div class="number">6️⃣</div>
<span id="p6">ปางช้างเผือกเชียงคาน</span>
</a>

</div>

</div>

<script src="tour.js"></script>

</body>
</html>
